<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript</title>
    <style>
        body{
            background-color: lightgreen;
        }
    </style>
</head>
<body>
    <a href="#" onclick="clicou()">Clique aqui</a>

    <div id="saida"></div>

    <script>
        function clicou() {
            s = window.document.getElementById("saida");
            s.innerHTML += '<p>Você clicou no link</p>';
        }
    </script>
</body>
</html>
