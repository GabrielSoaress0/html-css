<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card de Produto - Gabrielle Essence</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main>
        <article class="product-card">
            <div class="product-image">
                <img src="images/image-product-mobile.jpg" alt="Frasco do perfume Gabrielle Chanel">
            </div>

            <div class="product-content">
                <p class="category">PERFUME</p>
                
                <h1 class="product-title">Gabrielle Essence Eau De Parfum</h1>
                
                <p class="description">
                    A floral, solar and voluptuous interpretation composed by Olivier Polge, 
                    Perfumer-Creator for the House of CHANEL.
                </p>

                <div class="price-container">
                    <span class="current-price">$149.99</span>
                    <span class="old-price">$169.99</span>
                </div>

                <button class="add-button">
                    <img src="icon-cart.svg" alt=""> Adicionar ao carrinho
                </button>
            </div>
        </article>
    </main>

</body>
</html>
